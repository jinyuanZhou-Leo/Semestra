# input:  [Alembic CLI and backend migration workspace path]
# output: [Alembic configuration for Semestra backend schema migrations]
# pos:    [Backend migration runner configuration that points the Alembic CLI at the local migration environment]
#
# ⚠️ When this file is updated:
#    1. Update these header comments
#    2. Update the INDEX.md of the folder this file belongs to
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./semestra.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
